name: Submit to Winget

# Publish Docutaz to the Windows Package Manager community repo
# (microsoft/winget-pkgs) automatically whenever a GitHub Release is published.
#
# The `released` event fires when a release is published as a *full* release
# (not a draft, not a pre-release) — exactly when the Windows installer asset
# (docutaz-<ver>-windows-x86_64-setup.exe) is already attached. Pre-releases
# (tags like v2.2.0-rc1) do NOT trigger this, so RCs never reach Winget.
#
# One-time setup is required before this works — see packaging/winget/README.md:
#   1. Fork microsoft/winget-pkgs into this org.
#   2. Create a classic PAT with `public_repo` scope and add it as the
#      WINGET_TOKEN repository secret.

on:
  release:
    types: [released]
  # Manual fallback: a `release` event runs the workflow file as it existed in
  # the tagged commit, so a fix made after tagging can't be picked up by
  # re-triggering the release. workflow_dispatch runs the file from the selected
  # branch (use main), letting us (re)submit an already-published release.
  workflow_dispatch:
    inputs:
      release-tag:
        description: "Existing release tag to submit (e.g. v2.1.1)"
        required: true
        type: string

jobs:
  winget:
    name: Open winget-pkgs PR
    runs-on: ubuntu-latest
    steps:
      - name: Submit manifest with winget-releaser
        uses: vedantmgoyal9/winget-releaser@v2
        with:
          identifier: Illimitable.Docutaz
          # Only the NSIS setup .exe is an installer; the portable zip and the
          # Linux/macOS archives in the same release must not be picked up.
          installers-regex: 'setup\.exe$'
          # The winget-pkgs fork lives in the org, not the token owner's account
          # (which is what fork-user defaults to), so name it explicitly. The
          # WINGET_TOKEN PAT must have push access to this fork.
          fork-user: Illimitable-Consulting-Private-Limited
          # On a release event use the triggering tag; on manual dispatch use the
          # tag passed as input.
          release-tag: ${{ github.event.release.tag_name || inputs.release-tag }}
          token: ${{ secrets.WINGET_TOKEN }}
