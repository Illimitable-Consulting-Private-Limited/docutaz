name: Pages

# Publishes the self-contained landing site in site/ (index.html + its images)
# to GitHub Pages. Deploys from main only; run manually for a one-off.
# Requires repo Settings -> Pages -> Source = "GitHub Actions".
on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deploy; don't cancel an in-flight publish.
concurrency:
  group: pages
  cancel-in-progress: false

# The Pages actions (configure-pages / upload-pages-artifact -> upload-artifact /
# deploy-pages) still ship Node 20. Force them onto Node 24 ahead of GitHub's
# 2026-06-16 cutover — same approach as the Windows job in build.yml. Drop this
# once those actions release Node 24 majors.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: Build & deploy Pages
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/configure-pages@v5
      # site/ is self-contained: index.html + its images (docutaz-branding.png,
      # tab.png). The source-of-truth design files live in the gitignored
      # branding/; the web copies are committed under site/.
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
