name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:
    inputs:
      linux:
        description: "Build Linux"
        type: boolean
        default: true
      windows:
        description: "Build Windows"
        type: boolean
        default: true
      macos:
        description: "Build macOS (arm64)"
        type: boolean
        default: true

# Driver versions — bump both here when upgrading
env:
  MONGOC_VERSION: "2.3.0"
  MONGOCXX_VERSION: "4.3.1"

jobs:

  # ──────────────────────────────────────────────────────────────────────────
  # Linux — apt packages; produces tarball via bin/bundle-linux.sh
  # ──────────────────────────────────────────────────────────────────────────
  linux:
    name: Linux (Ubuntu 24.04)
    runs-on: ubuntu-24.04
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.linux }}

    steps:
      - uses: actions/checkout@v6

      - name: Install Qt6 and system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            ninja-build \
            qt6-base-dev \
            libqscintilla2-qt6-dev \
            libssl-dev \
            libssh2-1-dev \
            pkg-config

      # ── mongo-cxx-driver ──────────────────────────────────────────────────
      # We build from source to match the exact 4.x ABI used locally.
      # The install prefix is cached so subsequent runs skip the build.

      - name: Cache mongocxx install
        id: cache-mongocxx
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/mongocxx-prefix
          key: mongocxx-${{ env.MONGOCXX_VERSION }}-mongoc-${{ env.MONGOC_VERSION }}-ubuntu24.04-v1

      - name: Build mongo-c-driver
        if: steps.cache-mongocxx.outputs.cache-hit != 'true'
        run: |
          wget -q "https://github.com/mongodb/mongo-c-driver/releases/download/${{ env.MONGOC_VERSION }}/mongo-c-driver-${{ env.MONGOC_VERSION }}.tar.gz"
          tar xf "mongo-c-driver-${{ env.MONGOC_VERSION }}.tar.gz"
          cmake -S "mongo-c-driver-${{ env.MONGOC_VERSION }}" -B build-mongoc -GNinja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}/mongocxx-prefix" \
            -DENABLE_AUTOMATIC_INIT_AND_CLEANUP=OFF \
            -DENABLE_TESTS=OFF \
            -DENABLE_EXAMPLES=OFF
          cmake --build build-mongoc
          cmake --install build-mongoc

      - name: Build mongo-cxx-driver
        if: steps.cache-mongocxx.outputs.cache-hit != 'true'
        run: |
          wget -q "https://github.com/mongodb/mongo-cxx-driver/releases/download/r${{ env.MONGOCXX_VERSION }}/mongo-cxx-driver-r${{ env.MONGOCXX_VERSION }}.tar.gz"
          tar xf "mongo-cxx-driver-r${{ env.MONGOCXX_VERSION }}.tar.gz"
          cmake -S "mongo-cxx-driver-r${{ env.MONGOCXX_VERSION }}" -B build-mongocxx -GNinja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}/mongocxx-prefix" \
            -DCMAKE_PREFIX_PATH="${{ github.workspace }}/mongocxx-prefix"
          cmake --build build-mongocxx
          cmake --install build-mongocxx

      - name: Configure Docutaz
        run: |
          mkdir build
          cmake -S . -B build -GNinja \
            -DCMAKE_BUILD_TYPE=Release \
            -DDOCUTAZ_BUILD_TESTS=ON \
            -DCMAKE_PREFIX_PATH="${{ github.workspace }}/mongocxx-prefix/lib64/cmake;${{ github.workspace }}/mongocxx-prefix/lib/cmake;${{ github.workspace }}/mongocxx-prefix"

      - name: Build
        run: cmake --build build --target docutaz robo_unit_tests --parallel

      - name: Expose mongocxx libs for bundler
        # bin/bundle-linux.sh scans /usr/local/lib64; copy the CI-built shared
        # libs there so the bundler's glob finds them. This also satisfies the
        # robo_unit_tests rpath (/usr/local/lib64) before ctest runs.
        run: |
          sudo mkdir -p /usr/local/lib64
          sudo find "${{ github.workspace }}/mongocxx-prefix" \
            \( -name "*.so" -o -name "*.so.*" \) \
            -exec cp -Pf {} /usr/local/lib64/ \;

      - name: Run unit tests
        run: ctest --test-dir build --output-on-failure

      - name: Create tarball
        run: bash bin/bundle-linux.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: docutaz-linux
          path: docutaz-*-linux-x86_64.tar.gz
          if-no-files-found: error

  # ──────────────────────────────────────────────────────────────────────────
  # Windows — Qt via aqtinstall (pre-built), mongocxx built from source
  #
  # Why not vcpkg for Qt?  vcpkg builds Qt from source which takes 30-60 min
  # per run even with binary caching on first miss.  aqtinstall downloads the
  # same pre-built Qt binaries that Qt's installer uses — ~2 minutes.
  # To switch to full vcpkg, delete the install-qt-action step and add
  # qtbase + qtsvg to vcpkg.json (note: that also drags QScintilla's Qt build).
  # ──────────────────────────────────────────────────────────────────────────
  windows:
    name: Windows (x64)
    runs-on: windows-latest
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.windows }}

    # ilammy/msvc-dev-cmd has no Node 24 release yet (latest v1.13.0 still
    # declares node20). Opt this job into Node 24 so the action runs on the
    # supported runtime ahead of GitHub's 2026-06-16 forced cutover. The other
    # actions in this job are already node24, so this only affects msvc-dev-cmd.
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v6

      - name: Install Qt 6
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.8.1"
          arch: win64_msvc2022_64
          cache: true

      # Activate the MSVC toolchain so Ninja compiles with cl.exe (matching the
      # MSVC-ABI Qt above). Without this, CMake picks up the MinGW gcc that ships
      # on the runner's PATH, producing an ABI mismatch against Qt/mongocxx.
      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # QScintilla isn't shipped by aqtinstall and the vcpkg port would pull a
      # full vcpkg Qt build (defeating aqtinstall). Build it from source against
      # the aqtinstall Qt6 with qmake/nmake and install into the Qt prefix, so
      # the build's find_path/find_library locate Qsci headers + qscintilla2_qt6.
      - name: Build QScintilla (Qt6, from source)
        shell: pwsh
        env:
          QSCI_VERSION: "2.14.1"
        run: |
          $url = "https://www.riverbankcomputing.com/static/Downloads/QScintilla/$env:QSCI_VERSION/QScintilla_src-$env:QSCI_VERSION.tar.gz"
          curl.exe -L -o qscintilla.tar.gz $url
          tar -xf qscintilla.tar.gz
          cd "QScintilla_src-$env:QSCI_VERSION/src"
          qmake qscintilla.pro
          nmake
          nmake install

      # vcpkg provides OpenSSL and libssh2 — both pinned via the
      # builtin-baseline in ci/vcpkg/vcpkg.json. find_package(Libssh2) and our
      # cmake/FindOpenSSL.cmake locate them via CMAKE_PREFIX_PATH (set in
      # Configure). mongo-c-driver uses Windows SChannel, not OpenSSL, so
      # OpenSSL here is only for the libssh2 / ssh / docutaz link.
      - name: Cache vcpkg deps
        id: cache-vcpkg
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}\vcpkg-deps
          key: vcpkg-deps-x64-windows-${{ hashFiles('ci/vcpkg/vcpkg.json') }}-v1

      - name: Install OpenSSL + libssh2 (vcpkg, pinned)
        if: steps.cache-vcpkg.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          # The pinned builtin-baseline (ci/vcpkg/vcpkg.json) is usually newer
          # than the commit in the runner's preinstalled vcpkg, so manifest
          # resolution can't read versions/baseline.json at that commit. Fetch
          # so the baseline commit and its registry objects are available.
          git -C "$env:VCPKG_INSTALLATION_ROOT" fetch --quiet origin
          # Manifest-mode install from ci/vcpkg/vcpkg.json (a dedicated manifest,
          # NOT the repo root, so mongo-cxx-driver is not pulled in — we build
          # that separately). The manifest's builtin-baseline pins all versions.
          & "$env:VCPKG_INSTALLATION_ROOT\vcpkg.exe" install `
            --vcpkg-root="$env:VCPKG_INSTALLATION_ROOT" `
            --x-manifest-root="$env:GITHUB_WORKSPACE\ci\vcpkg" `
            --triplet x64-windows `
            --x-install-root="$env:GITHUB_WORKSPACE\vcpkg-deps"

      - name: Cache mongocxx install
        id: cache-mongocxx
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}\mongocxx-prefix
          key: mongocxx-${{ env.MONGOCXX_VERSION }}-mongoc-${{ env.MONGOC_VERSION }}-windows-msvc-v2

      - name: Build mongo-c-driver (Windows)
        if: steps.cache-mongocxx.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Invoke-WebRequest -Uri "https://github.com/mongodb/mongo-c-driver/releases/download/$env:MONGOC_VERSION/mongo-c-driver-$env:MONGOC_VERSION.tar.gz" -OutFile mongoc.tar.gz
          tar xf mongoc.tar.gz
          cmake -S "mongo-c-driver-$env:MONGOC_VERSION" -B build-mongoc -GNinja `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_C_COMPILER=cl -DCMAKE_CXX_COMPILER=cl `
            -DCMAKE_INSTALL_PREFIX="$env:GITHUB_WORKSPACE\mongocxx-prefix" `
            -DENABLE_AUTOMATIC_INIT_AND_CLEANUP=OFF `
            -DENABLE_TESTS=OFF `
            -DENABLE_EXAMPLES=OFF
          cmake --build build-mongoc
          cmake --install build-mongoc

      - name: Build mongo-cxx-driver (Windows)
        if: steps.cache-mongocxx.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Invoke-WebRequest -Uri "https://github.com/mongodb/mongo-cxx-driver/releases/download/r$env:MONGOCXX_VERSION/mongo-cxx-driver-r$env:MONGOCXX_VERSION.tar.gz" -OutFile mongocxx.tar.gz
          tar xf mongocxx.tar.gz
          cmake -S "mongo-cxx-driver-r$env:MONGOCXX_VERSION" -B build-mongocxx -GNinja `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_C_COMPILER=cl -DCMAKE_CXX_COMPILER=cl `
            -DCMAKE_INSTALL_PREFIX="$env:GITHUB_WORKSPACE\mongocxx-prefix" `
            -DCMAKE_PREFIX_PATH="$env:GITHUB_WORKSPACE\mongocxx-prefix"
          cmake --build build-mongocxx
          cmake --install build-mongocxx

      - name: Configure Docutaz (Windows)
        shell: pwsh
        run: |
          cmake -S . -B build -GNinja `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_C_COMPILER=cl -DCMAKE_CXX_COMPILER=cl `
            -DDOCUTAZ_BUILD_TESTS=OFF `
            -DCMAKE_PREFIX_PATH="$env:QT_ROOT_DIR;$env:GITHUB_WORKSPACE\mongocxx-prefix\lib\cmake;$env:GITHUB_WORKSPACE\mongocxx-prefix\cmake;$env:GITHUB_WORKSPACE\mongocxx-prefix;$env:GITHUB_WORKSPACE\vcpkg-deps\x64-windows"

      - name: Build
        run: cmake --build build --target docutaz --parallel

      - name: Read version
        id: ver
        shell: pwsh
        run: |
          $txt = Get-Content CMakeLists.txt -Raw
          $major = [regex]::Match($txt, 'PROJECT_VERSION_MAJOR\s+"(\d+)"').Groups[1].Value
          $minor = [regex]::Match($txt, 'PROJECT_VERSION_MINOR\s+"(\d+)"').Groups[1].Value
          $patch = [regex]::Match($txt, 'PROJECT_VERSION_PATCH\s+"(\d+)"').Groups[1].Value
          "version=$major.$minor.$patch" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Package (Windows)
        shell: pwsh
        run: |
          $ver = "${{ steps.ver.outputs.version }}"
          $outDir = "docutaz-$ver-windows-x86_64"
          New-Item -ItemType Directory -Path $outDir | Out-Null
          # Deploy Qt DLLs alongside the binary
          windeployqt --dir $outDir build\src\docutaz\docutaz.exe
          Copy-Item build\src\docutaz\docutaz.exe $outDir\
          # QScintilla DLL (built from source into the Qt prefix; not a Qt
          # module, so windeployqt does not pick it up)
          Get-ChildItem "$env:QT_ROOT_DIR\bin" -Filter "qscintilla2_qt6*.dll" | Copy-Item -Destination $outDir
          # mongocxx runtime DLLs
          $mongoBin = "$env:GITHUB_WORKSPACE\mongocxx-prefix\bin"
          if (Test-Path $mongoBin) {
            Get-ChildItem $mongoBin -Filter "*.dll" | Copy-Item -Destination $outDir
          }
          # libssh2 + its OpenSSL runtime DLLs (linked dynamically)
          $vcpkgBin = "$env:GITHUB_WORKSPACE\vcpkg-deps\x64-windows\bin"
          if (Test-Path $vcpkgBin) {
            Get-ChildItem $vcpkgBin -Filter "libssh2*.dll"   | Copy-Item -Destination $outDir
            Get-ChildItem $vcpkgBin -Filter "libssl*.dll"    | Copy-Item -Destination $outDir
            Get-ChildItem $vcpkgBin -Filter "libcrypto*.dll" | Copy-Item -Destination $outDir
          }
          Compress-Archive -Path $outDir -DestinationPath "docutaz-$ver-windows-x86_64.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: docutaz-windows
          path: docutaz-*-windows-x86_64.zip
          if-no-files-found: error

  # ──────────────────────────────────────────────────────────────────────────
  # macOS (Apple Silicon / arm64) — native Qt6 via Homebrew qt, mongocxx
  # built from source. Homebrew qt/qscintilla2 are native arm64 on Apple Silicon.
  # ──────────────────────────────────────────────────────────────────────────
  macos:
    name: macOS (Apple Silicon / arm64)
    runs-on: macos-14   # Apple Silicon (arm64) runner
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.macos }}

    env:
      # Homebrew's qt (Qt 6) and qscintilla2 are compiled natively for arm64 on
      # Apple Silicon.
      MACOS_ARCH: arm64
      MACOS_DEPLOYMENT_TARGET: "11.0"

    steps:
      - uses: actions/checkout@v6

      - name: Install build tools and native arm64 Qt 6
        run: brew install ninja qt qscintilla2 libssh2 pkg-config

      - name: Expose Qt prefix
        run: echo "QT_PREFIX=$(brew --prefix qt)" >> "$GITHUB_ENV"

      - name: Cache mongocxx install
        id: cache-mongocxx
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/mongocxx-prefix
          key: mongocxx-${{ env.MONGOCXX_VERSION }}-mongoc-${{ env.MONGOC_VERSION }}-macos14-arm64-v1

      - name: Build mongo-c-driver (macOS)
        if: steps.cache-mongocxx.outputs.cache-hit != 'true'
        run: |
          curl -fsSL -o mongoc.tar.gz \
            "https://github.com/mongodb/mongo-c-driver/releases/download/${{ env.MONGOC_VERSION }}/mongo-c-driver-${{ env.MONGOC_VERSION }}.tar.gz"
          tar xf mongoc.tar.gz
          cmake -S "mongo-c-driver-${{ env.MONGOC_VERSION }}" -B build-mongoc -GNinja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES="${{ env.MACOS_ARCH }}" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET="${{ env.MACOS_DEPLOYMENT_TARGET }}" \
            -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}/mongocxx-prefix" \
            -DENABLE_AUTOMATIC_INIT_AND_CLEANUP=OFF \
            -DENABLE_TESTS=OFF \
            -DENABLE_EXAMPLES=OFF
          cmake --build build-mongoc
          cmake --install build-mongoc

      - name: Build mongo-cxx-driver (macOS)
        if: steps.cache-mongocxx.outputs.cache-hit != 'true'
        run: |
          curl -fsSL -o mongocxx.tar.gz \
            "https://github.com/mongodb/mongo-cxx-driver/releases/download/r${{ env.MONGOCXX_VERSION }}/mongo-cxx-driver-r${{ env.MONGOCXX_VERSION }}.tar.gz"
          tar xf mongocxx.tar.gz
          cmake -S "mongo-cxx-driver-r${{ env.MONGOCXX_VERSION }}" -B build-mongocxx -GNinja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES="${{ env.MACOS_ARCH }}" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET="${{ env.MACOS_DEPLOYMENT_TARGET }}" \
            -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}/mongocxx-prefix" \
            -DCMAKE_PREFIX_PATH="${{ github.workspace }}/mongocxx-prefix"
          cmake --build build-mongocxx
          cmake --install build-mongocxx

      - name: Configure Docutaz (macOS)
        run: |
          # Help pkg-config find Homebrew's libssh2.pc (libssh2 is not keg-only,
          # but set it explicitly so the resolution is robust on the runner).
          export PKG_CONFIG_PATH="$(brew --prefix libssh2)/lib/pkgconfig:${PKG_CONFIG_PATH:-}"
          cmake -S . -B build -GNinja \
            -DCMAKE_BUILD_TYPE=Release \
            -DDOCUTAZ_BUILD_TESTS=OFF \
            -DCMAKE_OSX_ARCHITECTURES="${{ env.MACOS_ARCH }}" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET="${{ env.MACOS_DEPLOYMENT_TARGET }}" \
            -DCMAKE_PREFIX_PATH="$QT_PREFIX;$(brew --prefix qscintilla2);$(brew --prefix);${{ github.workspace }}/mongocxx-prefix/lib/cmake;${{ github.workspace }}/mongocxx-prefix/lib64/cmake;${{ github.workspace }}/mongocxx-prefix"

      - name: Build
        run: cmake --build build --target docutaz --parallel

      - name: Read version
        id: ver
        run: |
          V_MAJOR=$(grep 'PROJECT_VERSION_MAJOR' CMakeLists.txt | head -1 | grep -o '"[^"]*"' | tr -d '"')
          V_MINOR=$(grep 'PROJECT_VERSION_MINOR' CMakeLists.txt | head -1 | grep -o '"[^"]*"' | tr -d '"')
          V_PATCH=$(grep 'PROJECT_VERSION_PATCH' CMakeLists.txt | head -1 | grep -o '"[^"]*"' | tr -d '"')
          echo "version=$V_MAJOR.$V_MINOR.$V_PATCH" >> "$GITHUB_OUTPUT"

      - name: Package (macOS)
        run: |
          ver="${{ steps.ver.outputs.version }}"
          cd build/src/docutaz
          "$QT_PREFIX/bin/macdeployqt" Docutaz.app
          zip -r "../../../docutaz-${ver}-macos-arm64.zip" Docutaz.app

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: docutaz-macos
          path: docutaz-*-macos-arm64.zip
          if-no-files-found: error
